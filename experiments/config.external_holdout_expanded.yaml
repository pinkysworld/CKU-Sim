# Expanded external holdout configuration for audited replication.

data_dir: "data"

nvd_api_key: null
nvd_rate_limit: 6.0
osv_rate_limit: 0.1
osv_query_batch_size: 100

compression_algorithms:
  - gzip
  - lzma
  - zstd

composite_weights:
  compressibility: 0.35
  entropy: 0.25
  cyclomatic_density: 0.25
  halstead_volume: 0.15

monte_carlo_runs: 10000
random_seed: 42
portfolio_size: 100

corpus:
