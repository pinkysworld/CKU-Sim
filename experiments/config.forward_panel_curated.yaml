# Curated configuration for the strengthened forward-looking panel.

data_dir: "data"

nvd_api_key: null
nvd_rate_limit: 6.0
osv_rate_limit: 0.1
osv_query_batch_size: 100

compression_algorithms:
  - gzip
  - lzma
  - zstd

composite_weights:
  compressibility: 0.35
  entropy: 0.25
  cyclomatic_density: 0.25
  halstead_volume: 0.15

monte_carlo_runs: 10000
random_seed: 42
portfolio_size: 100

corpus:
  - name: curl
    git_url: https://github.com/curl/curl.git
    cpe_id: "cpe:2.3:a:haxx:curl:*:*:*:*:*:*:*:*"
    category: low_opacity

  - name: php-src
    git_url: https://github.com/php/php-src.git
    cpe_id: "cpe:2.3:a:php:php:*:*:*:*:*:*:*:*"
    category: high_opacity

  - name: django-django
    git_url: https://github.com/django/django.git
    category: expanded
    full_name: django/django
    primary_language: Python
    stars: 87222
    source_extensions:
      - .py

  - name: openssl
    git_url: https://github.com/openssl/openssl.git
    cpe_id: "cpe:2.3:a:openssl:openssl:*:*:*:*:*:*:*:*"
    category: high_opacity

  - name: redis
    git_url: https://github.com/redis/redis.git
    cpe_id: "cpe:2.3:a:redis:redis:*:*:*:*:*:*:*:*"
    category: low_opacity

  - name: sqlite
