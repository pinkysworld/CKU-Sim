# CKU-Sim experiment configuration
# Copy to config.yaml and edit as needed.

# Where to store data
data_dir: "data"

# NVD API key (optional, get one free at https://nvd.nist.gov/developers/request-an-api-key)
# Without a key: ~5 requests per 30 seconds
# With a key: ~50 requests per 30 seconds
nvd_api_key: null
nvd_rate_limit: 6.0  # seconds between NVD requests (0.6 with API key)
osv_rate_limit: 0.1  # seconds between OSV requests
osv_query_batch_size: 100

# Compression algorithms to test
compression_algorithms:
  - gzip
  - lzma
  - zstd

# Default composite opacity weights
composite_weights:
  compressibility: 0.35
  entropy: 0.25
  cyclomatic_density: 0.25
  halstead_volume: 0.15

# Monte Carlo simulation
monte_carlo_runs: 10000
random_seed: 42
portfolio_size: 100

# Corpus definition
# Categories: high_opacity, low_opacity, mixed
# cpe_id: used to match against NVD CVE records
# subdirectory: optional, restricts analysis to a subfolder
corpus:
  # --- High opacity (expected) ---
  - name: openssl
    git_url: https://github.com/openssl/openssl.git
    cpe_id: "cpe:2.3:a:openssl:openssl:*:*:*:*:*:*:*:*"
    category: high_opacity

  - name: ffmpeg
    git_url: https://github.com/FFmpeg/FFmpeg.git
    cpe_id: "cpe:2.3:a:ffmpeg:ffmpeg:*:*:*:*:*:*:*:*"
    category: high_opacity

  - name: php-src
    git_url: https://github.com/php/php-src.git
    cpe_id: "cpe:2.3:a:php:php:*:*:*:*:*:*:*:*"
    category: high_opacity

  - name: imagemagick
    git_url: https://github.com/ImageMagick/ImageMagick.git
    cpe_id: "cpe:2.3:a:imagemagick:imagemagick:*:*:*:*:*:*:*:*"
    category: high_opacity

  - name: libxml2
    git_url: https://github.com/GNOME/libxml2.git
    cpe_id: "cpe:2.3:a:xmlsoft:libxml2:*:*:*:*:*:*:*:*"
    category: high_opacity

  - name: linux-net
    git_url: https://github.com/torvalds/linux.git
    cpe_id: "cpe:2.3:o:linux:linux_kernel:*:*:*:*:*:*:*:*"
    category: high_opacity
    subdirectory: "net/"

  - name: samba
    git_url: https://github.com/samba-team/samba.git
    cpe_id: "cpe:2.3:a:samba:samba:*:*:*:*:*:*:*:*"
    category: high_opacity

  - name: wireshark
